name: Controlled delivery

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment receiving the immutable images
        required: true
        type: choice
        options: [test, demo]
      image_tag:
        description: Immutable image tag (semantic version required for demo)
        required: true
        type: string
  push:
    tags: ["v*.*.*"]

concurrency:
  group: cd-${{ inputs.target_environment || 'demo' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Delivery plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.parameters.outputs.environment }}
      image_tag: ${{ steps.parameters.outputs.image_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13.7
      - name: Resolve controlled parameters
        id: parameters
        env:
          REQUESTED_ENV: ${{ inputs.target_environment }}
          REQUESTED_TAG: ${{ inputs.image_tag }}
        run: |
          environment="${REQUESTED_ENV:-demo}"
          image_tag="${REQUESTED_TAG:-$GITHUB_REF_NAME}"
          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          python scripts/deploy.py plan --environment "$environment" --image-tag "$image_tag" --commit "$GITHUB_SHA" --output deployment-plan.json
      - name: Store auditable delivery plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deployment-plan-${{ steps.parameters.outputs.environment }}-${{ steps.parameters.outputs.image_tag }}
          path: deployment-plan.json
          if-no-files-found: error

  publish:
    name: Publish immutable images
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ needs.plan.outputs.environment }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: risco_bancario-api
            dockerfile: docker/Dockerfile.api
          - image: risco_bancario-frontend
            dockerfile: docker/Dockerfile.frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Authenticate to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish by immutable tag
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/masteradilio/${{ matrix.image }}:${{ needs.plan.outputs.image_tag }}

  release-notes:
    name: Publish generated release notes
    if: startsWith(github.ref, 'refs/tags/')
    needs: [plan, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release from merged changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
