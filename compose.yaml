name: risco-bancario

services:
  api:
    profiles: [local, test, demo]
    image: ghcr.io/masteradilio/risco_bancario-api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - ${RISK_ENV_FILE:-.env.local}
    environment:
      CODE_COMMIT: ${CODE_COMMIT:-unknown}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - risk-data:/app/var
    restart: unless-stopped

  frontend:
    profiles: [local, test, demo]
    image: ghcr.io/masteradilio/risco_bancario-frontend:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./config/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/observability/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    profiles: [observability]
    image: grafana/grafana:12.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    restart: unless-stopped

volumes:
  risk-data:
